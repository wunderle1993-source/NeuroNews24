name: Daily AI News Telegram Bot

on:
  schedule:
    # 08:00 and 17:00 German time:
    # In Winter (CET, UTC+1), this is 07:00 and 16:00 UTC.
    # In Summer (CEST, UTC+2), this is 06:00 and 15:00 UTC.
    # We configure for winter/standard time (07:00 & 16:00 UTC) as a baseline.
    - cron: '0 7,16 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Telegram Bot Pipeline
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHANNEL_ID_DE: ${{ secrets.TELEGRAM_CHANNEL_ID_DE }}
        TELEGRAM_CHANNEL_ID_EN: ${{ secrets.TELEGRAM_CHANNEL_ID_EN }}
        TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        BOT_MODE: ${{ secrets.BOT_MODE }}
      run: python main.py
