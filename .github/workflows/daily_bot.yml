name: NeuroNews24 - 3x Daily AI News Post

on:
  schedule:
    # Retry scheduler: GitHub schedule can drop individual runs.
    # We wake every 5 minutes and only post once during 08/15/18 Berlin hours.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a verified test post even if this target hour already posted"
        required: false
        default: "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post-ai-news:
    name: Post AI News Update to Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check Berlin posting time and duplicate guard
        id: schedule_check
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_RUN: ${{ github.event.inputs.force || 'false' }}
        run: |
          berlin_hour="$(TZ=Europe/Berlin date +'%H')"
          target_key="$(TZ=Europe/Berlin date +'%Y-%m-%d-%H')"
          echo "Berlin hour is: ${berlin_hour}"
          if [ "${FORCE_RUN}" = "true" ]; then
            echo "Force run requested. Continuing outside normal target hours."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "target_key=${target_key}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${berlin_hour}" in
            08|15|18)
              echo "Scheduled target hour matched."
              last_key="$(gh api "repos/${GITHUB_REPOSITORY}/actions/variables/LAST_SUCCESSFUL_POST_KEY" --jq .value 2>/dev/null || true)"
              echo "Last successful post key: ${last_key:-none}"
              if [ "${last_key}" = "${target_key}" ]; then
                echo "This target hour already posted successfully. Skipping duplicate retry."
                echo "should_run=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "target_key=${target_key}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Not a target posting hour in Europe/Berlin. Skipping this DST guard run."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

      - name: Checkout repository
        if: steps.schedule_check.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.schedule_check.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: steps.schedule_check.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run NeuroNews24 Bot
        if: steps.schedule_check.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHANNEL_ID_DE: ${{ secrets.TELEGRAM_CHANNEL_ID_DE }}
          TELEGRAM_CHANNEL_ID_EN: ${{ secrets.TELEGRAM_CHANNEL_ID_EN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_MODE: ${{ secrets.BOT_MODE }}
          PYTHONIOENCODING: utf-8
        run: python main.py

      - name: Mark successful scheduled post
        if: steps.schedule_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_KEY: ${{ steps.schedule_check.outputs.target_key }}
        run: |
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/actions/variables/LAST_SUCCESSFUL_POST_KEY" \
            -f name=LAST_SUCCESSFUL_POST_KEY \
            -f value="${TARGET_KEY}" \
          || gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/variables" \
            -f name=LAST_SUCCESSFUL_POST_KEY \
            -f value="${TARGET_KEY}"
