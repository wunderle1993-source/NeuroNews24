name: Daily AI News Telegram Bot

on:
  schedule:
    - cron: "0 8,17 * * *"
      timezone: "Europe/Berlin"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validate required secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID_DE: ${{ secrets.TELEGRAM_CHANNEL_ID_DE }}
          TELEGRAM_CHANNEL_ID_EN: ${{ secrets.TELEGRAM_CHANNEL_ID_EN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_MODE: ${{ secrets.BOT_MODE }}
        run: |
          set -e
          missing=0

          for v in TELEGRAM_BOT_TOKEN GEMINI_API_KEY BOT_MODE; do
            if [ -z "${!v}" ]; then
              echo "::error::$v is empty or missing"
              missing=1
            fi
          done

          case "$BOT_MODE" in
            german_only|deutsch_only)
              if [ -z "$TELEGRAM_CHANNEL_ID_DE" ] && [ -z "$TELEGRAM_CHANNEL_ID" ]; then
                echo "::error::Need TELEGRAM_CHANNEL_ID_DE or TELEGRAM_CHANNEL_ID for BOT_MODE=$BOT_MODE"
                missing=1
              fi
              ;;
            english_only)
              if [ -z "$TELEGRAM_CHANNEL_ID_EN" ] && [ -z "$TELEGRAM_CHANNEL_ID" ]; then
                echo "::error::Need TELEGRAM_CHANNEL_ID_EN or TELEGRAM_CHANNEL_ID for BOT_MODE=$BOT_MODE"
                missing=1
              fi
              ;;
            bilingual_single_channel)
              if [ -z "$TELEGRAM_CHANNEL_ID" ]; then
                echo "::error::Need TELEGRAM_CHANNEL_ID for BOT_MODE=$BOT_MODE"
                missing=1
              fi
              ;;
            two_channels)
              if [ -z "$TELEGRAM_CHANNEL_ID_DE" ] || [ -z "$TELEGRAM_CHANNEL_ID_EN" ]; then
                echo "::error::Need TELEGRAM_CHANNEL_ID_DE and TELEGRAM_CHANNEL_ID_EN for BOT_MODE=$BOT_MODE"
                missing=1
              fi
              ;;
            *)
              echo "::error::Invalid BOT_MODE: $BOT_MODE"
              missing=1
              ;;
          esac

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Test Telegram token
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.request
          import urllib.error

          token = os.getenv("TELEGRAM_BOT_TOKEN", "")
          cleaned = token.strip()

          print("Token vorhanden:", bool(token))
          print("Token Laenge:", len(cleaned))
          print("Token Format grob ok:", bool(re.match(r"^\d{8,12}:[A-Za-z0-9_-]{20,}$", cleaned)))

          if cleaned != token:
              print("Fehler: Im Secret sind Leerzeichen oder ein Zeilenumbruch.")
              sys.exit(1)

          url = f"https://api.telegram.org/bot{cleaned}/getMe"
          print("Teste URL gegen Telegram...")

          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  body = response.read().decode("utf-8", errors="replace")
                  print("HTTP Status:", response.status)
                  print("Antwort:", body[:500])

                  data = json.loads(body)
                  if not data.get("ok"):
                      sys.exit(1)

          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print("HTTP Status:", e.code)
              print("Antwort:", body[:500])
              sys.exit(1)

          except Exception as e:
              print("Fehler:", str(e))
              sys.exit(1)
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Telegram Bot Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID_DE: ${{ secrets.TELEGRAM_CHANNEL_ID_DE }}
          TELEGRAM_CHANNEL_ID_EN: ${{ secrets.TELEGRAM_CHANNEL_ID_EN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_MODE: ${{ secrets.BOT_MODE }}
        run: python main.py
