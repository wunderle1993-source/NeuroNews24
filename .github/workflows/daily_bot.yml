name: Daily AI News Telegram Bot

on:
  schedule:
    # GitHub Actions uses UTC. Minute 7 avoids GitHub's peak load at :00.
    # These UTC slots cover about 08:07, 15:07 and
    # 18:07 Europe/Berlin in both summer time and winter time.
    - cron: "7 6,7,13,14,16,17 * * *"
    # Temporary live auto-test for 2026-05-24 15:15 Europe/Berlin.
    - cron: "15 13 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check scheduled Berlin posting time
        id: schedule_check
        if: github.event_name == 'schedule'
        run: |
          berlin_hour="$(TZ=Europe/Berlin date +'%H')"
          echo "Berlin hour is: ${berlin_hour}"
          case "${berlin_hour}" in
            08|15|18)
              echo "Scheduled target hour matched."
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Not a target posting hour in Europe/Berlin. Skipping this DST guard run."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

      - name: Checkout repository
        if: github.event_name != 'schedule' || steps.schedule_check.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: github.event_name != 'schedule' || steps.schedule_check.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validate required secrets
        if: github.event_name != 'schedule' || steps.schedule_check.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID_DE: ${{ secrets.TELEGRAM_CHANNEL_ID_DE }}
          TELEGRAM_CHANNEL_ID_EN: ${{ secrets.TELEGRAM_CHANNEL_ID_EN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_MODE: ${{ secrets.BOT_MODE }}
        run: |
          set -e
          missing=0

          for v in TELEGRAM_BOT_TOKEN GEMINI_API_KEY BOT_MODE; do
            if [ -z "${!v}" ]; then
              echo "::error::$v is empty or missing"
              missing=1
            fi
          done

          case "$BOT_MODE" in
            german_only|deutsch_only)
              if [ -z "$TELEGRAM_CHANNEL_ID_DE" ] && [ -z "$TELEGRAM_CHANNEL_ID" ]; then
                echo "::error::Need TELEGRAM_CHANNEL_ID_DE or TELEGRAM_CHANNEL_ID for BOT_MODE=$BOT_MODE"
                missing=1
              fi
              ;;
            english_only)
              if [ -z "$TELEGRAM_CHANNEL_ID_EN" ] && [ -z "$TELEGRAM_CHANNEL_ID" ]; then
                echo "::error::Need TELEGRAM_CHANNEL_ID_EN or TELEGRAM_CHANNEL_ID for BOT_MODE=$BOT_MODE"
                missing=1
              fi
              ;;
            bilingual_single_channel)
              if [ -z "$TELEGRAM_CHANNEL_ID" ]; then
                echo "::error::Need TELEGRAM_CHANNEL_ID for BOT_MODE=$BOT_MODE"
                missing=1
              fi
              ;;
            two_channels)
              if [ -z "$TELEGRAM_CHANNEL_ID_DE" ] || [ -z "$TELEGRAM_CHANNEL_ID_EN" ]; then
                echo "::error::Need TELEGRAM_CHANNEL_ID_DE and TELEGRAM_CHANNEL_ID_EN for BOT_MODE=$BOT_MODE"
                missing=1
              fi
              ;;
            *)
              echo "::error::Invalid BOT_MODE: $BOT_MODE"
              missing=1
              ;;
          esac

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Test Telegram token
        if: github.event_name != 'schedule' || steps.schedule_check.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.request

          token = os.getenv("TELEGRAM_BOT_TOKEN", "")
          cleaned = token.strip()

          print("Token present:", bool(token))
          print("Token length:", len(cleaned))
          print("Token format roughly ok:", bool(re.match(r"^\d{8,12}:[A-Za-z0-9_-]{20,}$", cleaned)))

          if cleaned != token:
              print("Secret contains leading/trailing whitespace or a newline.")
              sys.exit(1)

          url = f"https://api.telegram.org/bot{cleaned}/getMe"
          print("Testing Telegram token...")

          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  body = response.read().decode("utf-8", errors="replace")
                  print("HTTP status:", response.status)
                  print("Response:", body[:500])

                  data = json.loads(body)
                  if not data.get("ok"):
                      sys.exit(1)

          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print("HTTP status:", e.code)
              print("Response:", body[:500])
              sys.exit(1)

          except Exception as e:
              print("Error:", str(e))
              sys.exit(1)
          PY

      - name: Install dependencies
        if: github.event_name != 'schedule' || steps.schedule_check.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Telegram Bot Pipeline
        if: github.event_name != 'schedule' || steps.schedule_check.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID_DE: ${{ secrets.TELEGRAM_CHANNEL_ID_DE }}
          TELEGRAM_CHANNEL_ID_EN: ${{ secrets.TELEGRAM_CHANNEL_ID_EN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_MODE: ${{ secrets.BOT_MODE }}
        run: python main.py
